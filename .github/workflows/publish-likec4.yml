name: Publish LikeC4 diagrams

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Export LikeC4 diagrams
        uses: likec4/actions@v1
        with:
          export: png
          path: software/likec4
          output: site/images
          use-dot-bin: 'true'

      - name: Build LikeC4 website
        uses: likec4/actions@v1
        with:
          action: build
          path: software/likec4
          output: site
          base: /

      - name: Copy documentation
        run: |
          cp software/likec4/README.md site/README.md

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
